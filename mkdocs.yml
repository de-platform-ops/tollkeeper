site_name: Tollkeeper
repo_url: https://github.com/srchilukoori/tollkeeper
repo_name: srchilukoori/tollkeeper
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
      - SQL Passthrough Strategy: sql-strategy-flow.md
      - Docker Testing: docker-testing.md
  - API Reference: api.md
