name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: write-audit-publish version
      description: Output of `pip show write-audit-publish` or the pinned version in your lockfile
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Plain description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce
      description: Minimal steps or code to trigger the bug. Include the exact error output.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
    validations:
      required: false

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.13"
    validations:
      required: false

  - type: textarea
    id: anything-else
    attributes:
      label: Anything else?
    validations:
      required: false

  - type: checkboxes
    id: pr
    attributes:
      label: Are you willing to submit PR?
      description: This is absolutely not required, but we are happy to guide you in the contribution process.
      options:
        - label: Yes I am willing to submit a PR!
